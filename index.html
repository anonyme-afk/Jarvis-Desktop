<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;600;700&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- SCAN LINE OVERLAY -->
  <div class="scanlines"></div>

  <!-- VIGNETTE -->
  <div class="vignette"></div>

  <!-- APP -->
  <div id="app">

    <!-- HUD TOP LEFT -->
    <div class="hud-panel hud-tl" id="hud-tl">
      <div class="hud-bracket"></div>
      <div class="hud-row">
        <span class="hud-key">SYS</span>
        <span class="hud-val mono" id="sys-time">00:00:00</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">MIC</span>
        <span class="hud-val" id="mic-status">VEILLE</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">CAM</span>
        <span class="hud-val" id="cam-status">OFF</span>
      </div>
      <div class="hud-row">
        <span class="hud-key">MODE</span>
        <span class="hud-val accent" id="mode-display">—</span>
      </div>
    </div>

    <!-- HUD TOP RIGHT -->
    <div class="hud-panel hud-tr" id="hud-tr">
      <div class="hud-bracket"></div>
      <div class="hud-row hud-row-right">
        <span class="hud-val mono small" id="model-name">GEMINI 2.0</span>
        <button class="gear-btn" onclick="toggleProviderSelector()" title="Changer de modèle"><i data-lucide="settings" width="12" height="12"></i></button>
      </div>
      <div class="hud-row hud-row-right">
        <span class="hud-key">API</span>
        <span class="hud-val" id="api-status">
          <span class="dot dot-offline"></span>CONNEXION...
        </span>
      </div>
      <div class="hud-row hud-row-right">
        <span class="hud-key">LATENCE</span>
        <span class="hud-val mono small" id="latency-display">—</span>
      </div>
    </div>

    <!-- SÉLECTEUR DE MODÈLE -->
    <div id="provider-selector">
      <div class="provider-header">
        <span style="display:flex;align-items:center;gap:4px;"><i data-lucide="settings" width="12" height="12"></i> SÉLECTION DU MODÈLE IA</span>
        <button onclick="toggleProviderSelector()" class="close-btn"><i data-lucide="x" width="14" height="14"></i></button>
      </div>
      <div id="provider-list"></div>
      <div class="provider-section-title">OLLAMA LOCAL</div>
      <div id="ollama-list"><span class="provider-none">Ollama non détecté</span></div>
    </div>

    <!-- CHAT ZONE -->
    <div id="chat-zone"></div>

    <!-- INPUT MANUEL -->
    <div id="input-row">
      <input type="text" id="text-input" placeholder="Écris un message..." autocomplete="off" spellcheck="false">
      <button id="send-btn" onclick="handleInputSend()">↵</button>
    </div>

    <!-- WAVEFORM -->
    <canvas id="waveform-canvas"></canvas>

    <!-- CAMÉRA -->
    <div id="camera-feed">
      <video id="camera-video" autoplay muted playsinline></video>
      <div class="cam-overlay">
        <div class="cam-corner cam-tl"></div>
        <div class="cam-corner cam-tr"></div>
        <div class="cam-corner cam-bl"></div>
        <div class="cam-corner cam-br"></div>
        <div class="cam-scanline"></div>
        <span class="cam-label">VISION ACTIVE</span>
        <button class="cam-close" onclick="toggleCamera()"><i data-lucide="x" width="14" height="14"></i></button>
      </div>
    </div>

    <!-- ORBE JARVIS -->
    <div id="jarvis-orb">
      <div class="orb-bloom"></div>
      <svg class="orb-svg" viewBox="0 0 200 200">
        <!-- Anneau extérieur tirets -->
        <circle class="ring r1" cx="100" cy="100" r="94"
          stroke-dasharray="6 5" stroke-width="0.8"/>
        <!-- Anneau milieu asymétrique -->
        <circle class="ring r2" cx="100" cy="100" r="76"
          stroke-dasharray="140 20 30 20" stroke-width="1.5"/>
        <!-- Anneau intérieur -->
        <circle class="ring r3" cx="100" cy="100" r="58"
          stroke-dasharray="4 8" stroke-width="0.8"/>
        <!-- Marqueurs cardinaux -->
        <line class="marker" x1="100" y1="6" x2="100" y2="16"/>
        <line class="marker" x1="100" y1="184" x2="100" y2="194"/>
        <line class="marker" x1="6" y1="100" x2="16" y2="100"/>
        <line class="marker" x1="184" y1="100" x2="194" y2="100"/>
        <!-- Noyau -->
        <circle class="core-ring" cx="100" cy="100" r="40" stroke-width="1"/>
        <circle class="core-fill" cx="100" cy="100" r="34"/>
        <!-- Reflet interne -->
        <ellipse class="core-shine" cx="92" cy="90" rx="10" ry="6"/>
      </svg>
      <div class="orb-text">JARVIS</div>
    </div>

    <!-- PANNEAU OUTILS -->
    <button id="tools-btn" onclick="toggleToolsPanel()" title="Outils" style="display:flex;align-items:center;justify-content:center;"><i data-lucide="zap" width="18" height="18"></i></button>
    <div id="tools-panel">
      <div class="tools-header" style="display:flex;align-items:center;gap:4px;"><i data-lucide="zap" width="12" height="12"></i> OUTILS</div>
      <div id="tools-grid"></div>
    </div>

    <!-- STATUS BAR -->
    <div id="status-bar">
      <div class="status-left">
        <span id="status-dot" class="dot dot-offline"></span>
        <span id="status-text">INITIALISATION</span>
      </div>
      <div class="status-center">
        <span class="shortcut">ESPACE mic</span>
        <span class="shortcut">C cam</span>
        <span class="shortcut">ESC stop</span>
      </div>
      <div class="status-right mono" id="status-time">00:00</div>
    </div>

  </div>

  <!-- LOADER INITIAL -->
  <div id="boot-screen">
    <div class="boot-content">
      <div class="boot-orb-mini"></div>
      <div class="boot-text">J.A.R.V.I.S</div>
      <div class="boot-sub">INITIALISATION DU SYSTÈME...</div>
      <div class="boot-bar"><div class="boot-fill" id="boot-fill"></div></div>
    </div>
  </div>

  <script src="renderer.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
