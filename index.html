<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/style.css">
</head>
<body>
  <!-- FOND GRILLE MILLIMÈTRE -->
  <div id="grid-bg"></div>
  
  <!-- CARTE GOOGLE MAPS -->
  <div id="gmap-bg" style="position:fixed; inset:0; z-index:0; opacity:0; transition: opacity 2s ease;"></div>

  <!-- CANVAS CARTE RÉSEAU (fond) -->
  <canvas id="map-canvas" style="position:fixed; inset:0; z-index:1; pointer-events:none;"></canvas>


  <!-- APP PRINCIPALE -->
  <div id="app">
    <!-- HUD HAUT GAUCHE -->
    <div id="hud-left">
      <div class="hud-row">
        <span class="hl">SYS</span>
        <span class="hv mono" id="h-time">00:00:00</span>
      </div>
      <div class="hud-row" onclick="toggleMic()" style="cursor: pointer;" title="Cliquez pour basculer le microphone (Raccourci: Espace)">
        <span class="hl">MIC</span>
        <span class="hv" id="h-mic">VEILLE</span>
      </div>
      <div class="hud-row" onclick="toggleCam()" style="cursor: pointer;" title="Cliquez pour basculer la caméra (Raccourci: C)">
        <span class="hl">CAM</span>
        <span class="hv" id="h-cam">OFF</span>
      </div>
      <div class="hud-row">
        <span class="hl">CPU</span>
        <span class="hv mono" id="h-cpu">—</span>
      </div>
    </div>

    <!-- HUD HAUT DROIT -->
    <div id="hud-right">
      <div class="hud-row hr">
        <span class="hv mono small" id="h-model">GEMINI</span>
        <button class="hbtn" onclick="toggleModelPanel()"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
      <div class="hud-row hr">
        <span class="hl">API</span>
        <span class="hv" id="h-api"><span class="dot red"></span> HORS LIGNE</span>
      </div>
      <div class="hud-row hr">
        <span class="hl">MS</span>
        <span class="hv mono" id="h-latency">—</span>
      </div>
    </div>

    <!-- PANNEAU MODÈLES IA -->
    <div id="model-panel">
      <div class="mp-head">
        <span>MODÈLE IA</span>
        <button onclick="toggleModelPanel()"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      </div>
      <div id="mp-list"></div>
      <div class="mp-sep">OLLAMA LOCAL</div>
      <div id="mp-ollama"><span class="mp-empty">Non détecté · ollama.ai</span></div>
    </div>

    <!-- ORBE CENTRAL -->
    <div id="orb-wrap" class="orb-center">
      <div class="orb-glow-outer"></div>
      <svg id="orb-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="f-glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="f-glow-high" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="f-halo" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="24"/>
          </filter>
        </defs>

        <!-- Grille d'arrière plan circulaire (faint outer ticks and circles) -->
        <circle cx="150" cy="150" r="145" fill="none" stroke="rgba(0,243,255,0.06)" stroke-width="0.5"/>
        <line x1="150" y1="0" x2="150" y2="300" stroke="rgba(0,243,255,0.06)" stroke-width="0.5"/>
        <line x1="0" y1="150" x2="300" y2="150" stroke="rgba(0,243,255,0.06)" stroke-width="0.5"/>

        <!-- Cercle pointillé externe (Thin dashed outer ring) -->
        <circle cx="150" cy="150" r="130" fill="none" class="ring-spin-slow" stroke="rgba(0, 243, 255, 0.4)" stroke-width="1.2" stroke-dasharray="14 10" />

        <!-- Ticks (Crosshairs orthogonaux externes) -->
        <line x1="150" y1="12" x2="150" y2="30" stroke="#00E5FF" stroke-width="2.5" />
        <line x1="150" y1="270" x2="150" y2="288" stroke="#00E5FF" stroke-width="2.5" />
        <line x1="12" y1="150" x2="30" y2="150" stroke="#00E5FF" stroke-width="2.5" />
        <line x1="270" y1="150" x2="288" y2="150" stroke="#00E5FF" stroke-width="2.5" />

        <!-- Arc tournant 2 (Outer animated arc, unbroken) -->
        <circle class="ring-arc-2" cx="150" cy="150" r="110" fill="none" stroke="#00E5FF" stroke-width="2" stroke-dasharray="200 40 50 30" filter="url(#f-glow)" />

        <!-- Arc tournant 1 (Inner animated arc) -->
        <circle class="ring-arc-1" cx="150" cy="150" r="90" fill="none" stroke="#00E5FF" stroke-width="3" stroke-dasharray="140 40" filter="url(#f-glow)" />

        <!-- Cercle solide cyan interne -->
        <circle cx="150" cy="150" r="60" fill="none" stroke="#00E5FF" stroke-width="6" class="ring-inner-solid" filter="url(#f-glow-high)" />
        <circle cx="150" cy="150" r="57" fill="#030919" stroke="none" />

        <!-- Label JARVIS -->
        <text x="150" y="156" text-anchor="middle" font-family="Rajdhani, sans-serif" font-weight="700" font-size="20" letter-spacing="6" class="orb-text" filter="url(#f-glow)">JARVIS</text>
      </svg>
      <div id="orb-time"></div>
    </div>

    <!-- ZONE MESSAGES -->
    <div id="chat-zone"></div>

    <!-- PANNEAU CAMÉRA -->
    <div id="cam-panel">
      <video id="cam-video" autoplay muted playsinline></video>
      <div class="cam-overlay">
        <div class="co-tl"></div><div class="co-tr"></div>
        <div class="co-bl"></div><div class="co-br"></div>
        <div class="co-scan"></div>
        <span class="co-label">VISION</span>
        <button class="co-close" onclick="toggleCam()"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      </div>
    </div>

    <!-- WAVEFORM -->
    <canvas id="wave"></canvas>

    <!-- INPUT (apparaît au survol bas) -->
    <div id="input-wrap">
      <input id="txt" type="text" placeholder="Message…" autocomplete="off" spellcheck="false">
      <button id="send-btn" onclick="sendTxt()"><svg xmlns="http://www.w3.org/2000/svg" width="1.2em" height="1.2em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><polyline points="9 10 4 15 9 20"></polyline><path d="M20 4v7a4 4 0 0 1-4 4H4"></path></svg></button>
    </div>

    <!-- BOUTON OUTILS -->
    <button id="fab-tools" onclick="toggleTools()"><svg xmlns="http://www.w3.org/2000/svg" width="1.2em" height="1.2em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg></button>
    <div id="tools-panel">
      <div class="tp-title"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-bottom; margin-right: 4px;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> OUTILS</div>
      <div id="tools-grid"></div>
    </div>

    <!-- BARRE DE STATUT -->
    <div id="status-bar">
      <div class="sb-l">
        <span class="dot" id="sb-dot"></span>
        <span id="sb-status">INITIALISATION</span>
      </div>
      <div class="sb-c">
        <span class="kb">SPC</span><span class="kl">· micro</span>
        <span class="kb">C</span><span class="kl">· cam</span>
        <span class="kb">N</span><span class="kl">· carte</span>
        <span class="kb">ESC</span><span class="kl">· stop</span>
      </div>
      <div class="sb-r mono" id="sb-time">00:00</div>
    </div>
  </div>

  <!-- ÉCRAN DE BOOT -->
  <div id="boot-screen">
    <div id="boot-inner">
      <svg width="74" height="74" viewBox="0 0 74 74">
        <circle cx="37" cy="37" r="33" fill="none" stroke="rgba(50,110,210,0.18)" stroke-width="1.5"/>
        <circle id="boot-ring" cx="37" cy="37" r="33" fill="none" stroke="rgba(160,200,255,0.82)" stroke-width="1.8" stroke-dasharray="78 130"/>
      </svg>
      <div class="boot-name">J.A.R.V.I.S</div>
      <div class="boot-sub">INITIALISATION DU SYSTÈME</div>
      <div id="boot-bar"><div id="boot-fill"></div></div>
      <div class="boot-hint" id="boot-hint">Chargement des modules…</div>
    </div>
  </div>

  <!-- BOOT SCRIPT -->
  <script type="module">
    try {
      window.ENV_GMAPS_KEY = process.env.GOOGLE_MAPS_PLATFORM_KEY || "";
    } catch(e) {
      window.ENV_GMAPS_KEY = "";
    }
  </script>
  <script src="/src/scripts/renderer.js"></script>
</body>
</html>
